name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcdio-dev libcdio-cdda-dev libcdio-paranoia-dev 
          sudo apt-get install -y libiso9660-dev libudf-dev

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test
      
      - name: Build release
        run: cargo build --verbose --profile release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: rippy
          path: target/release/rippy
          
