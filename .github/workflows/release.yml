on:
  release:
    types: [created]

name: Handle Release

jobs:
  release:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-musl, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          # Note: These apt packages install x86_64 libraries. 
          # For true cross-compilation of C-dependent crates, 
          # you may need to ensure your build environment supports 
          # aarch64 headers if your project links against these libraries.
          sudo apt-get install -y libcdio-dev libcdio-cdda-dev libcdio-paranoia-dev libiso9660-dev libudf-dev
      
      - name: Compile and release
        uses: rust-build/rust-build.action@v1.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          RUSTTARGET: ${{ matrix.target }}
          EXTRA_FILES: "README.md LICENSE"
