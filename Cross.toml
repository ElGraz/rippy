[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install --assume-yes libcdio-dev libcdio-cdda-dev libcdio-paranoia-dev libiso9660-dev libudf-dev pkg-config"
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64 && apt-get update && apt-get install --assume-yes libcdio-dev:arm64 libcdio-cdda-dev:arm64 libcdio-paranoia-dev:arm64 libiso9660-dev:arm64 libudf-dev:arm64 pkg-config"
]
